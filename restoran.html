<!DOCTYPE html>
<html lang="id" class="transition-colors duration-300">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Input Data Restoran - Admin</title>
    <script>
        // Blokir akses komputer
        function blokirKomputer() {
            const isMobileAgent = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);
            const isTouchScreen = 'ontouchstart' in window || navigator.maxTouchPoints > 0;
            const isDesktopWidth = window.innerWidth > 1024;
            
            if (!isMobileAgent || !isTouchScreen || isDesktopWidth) {
                window.location.replace("https://data-cs.vercel.app/pengalihan.html"); 
            }
        }
        blokirKomputer();
        window.addEventListener('resize', blokirKomputer);

        // Blokir Inspect Element
        document.addEventListener('contextmenu', event => event.preventDefault());
        document.onkeydown = function(e) {
            if(e.keyCode == 123) return false;
            if(e.ctrlKey && e.shiftKey && e.keyCode == 'I'.charCodeAt(0)) return false;
            if(e.ctrlKey && e.shiftKey && e.keyCode == 'C'.charCodeAt(0)) return false;
            if(e.ctrlKey && e.shiftKey && e.keyCode == 'J'.charCodeAt(0)) return false;
            if(e.ctrlKey && e.keyCode == 'U'.charCodeAt(0)) return false;
        };

        setInterval(function() { debugger; }, 20);
        setInterval(function() { console.clear(); console.log("%cAKSES DITOLAK!", "color: red; font-size: 40px; font-weight: bold;"); }, 1000);

        if (localStorage.theme === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark');
        } else {
            document.documentElement.classList.remove('dark');
        }
    </script>
    <meta name="description" content="Form Input Data Restoran">
    <meta name="theme-color" content="#ef4444">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: { extend: { colors: { brand: {500:'#ef4444',600:'#dc2626'} } } }
        }
    </script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        .card-hover { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .card-hover:hover { transform: translateY(-4px); box-shadow: 0 10px 25px -5px rgba(0,0,0,0.1); }
        ::-webkit-scrollbar { width:6px; }
        ::-webkit-scrollbar-thumb { background:#cbd5e1; border-radius:10px; }
        .dark ::-webkit-scrollbar-thumb { background:#475569; }
        div:where(.swal2-container) button:where(.swal2-styled).swal2-confirm { background-color:#ef4444 !important; border-radius:0.75rem; }
    </style>
</head>
<body class="bg-gray-50 dark:bg-slate-900 text-gray-800 dark:text-gray-100 min-h-screen flex flex-col">

    <div id="loadingOverlay" class="fixed inset-0 bg-slate-900/95 backdrop-blur-md z-[200] hidden flex-col items-center justify-center">
        <div class="relative w-24 h-24 mb-6">
            <div class="absolute inset-0 border-4 border-slate-700/50 rounded-full"></div>
            <div class="absolute inset-0 border-4 border-brand-500 rounded-full border-t-transparent animate-spin"></div>
            <div class="absolute inset-0 flex items-center justify-center text-brand-500 text-2xl"><i class="fa-solid fa-utensils"></i></div>
        </div>
        <p class="text-brand-400 font-bold tracking-widest animate-pulse">MEMPROSES...</p>
    </div>

    <!-- LAYAR LOGIN -->
    <div id="loginScreen" class="fixed inset-0 bg-gradient-to-br from-slate-900 via-slate-800 to-red-900 z-[100] flex items-center justify-center p-4">
        <div class="bg-white/10 dark:bg-slate-900/40 backdrop-blur-xl border border-white/20 rounded-[2rem] shadow-2xl w-full max-w-md p-8 relative overflow-hidden">
            <div class="absolute top-[-50px] right-[-50px] w-32 h-32 bg-brand-500 rounded-full blur-[60px] opacity-40"></div>
            <div class="absolute bottom-[-50px] left-[-50px] w-32 h-32 bg-orange-500 rounded-full blur-[60px] opacity-30"></div>
            
            <div class="text-center mb-8 relative z-10">
                <div class="bg-gradient-to-br from-brand-400 to-brand-600 w-20 h-20 rounded-2xl flex items-center justify-center mx-auto mb-4 text-white text-3xl shadow-lg transform rotate-3">
                    <i class="fa-solid fa-shield-halved -rotate-3"></i>
                </div>
                <h3 class="text-3xl font-extrabold text-white">Akses Admin</h3>
                <p class="text-slate-300 text-sm mt-2">Hanya petugas berwenang</p>
            </div>
            <form id="loginForm" class="space-y-5 relative z-10">
                <div>
                    <label class="block text-sm font-bold mb-2 text-slate-200">Email</label>
                    <div class="relative">
                        <span class="absolute inset-y-0 left-0 flex items-center pl-4 text-slate-400"><i class="fa-solid fa-envelope"></i></span>
                        <input type="email" id="loginEmail" required class="w-full bg-slate-800/50 border border-slate-600/50 text-white rounded-xl pl-11 pr-4 py-3.5 focus:ring-2 focus:ring-brand-500" placeholder="admin@email.com">
                    </div>
                </div>
                <div>
                    <label class="block text-sm font-bold mb-2 text-slate-200">Kata Sandi</label>
                    <div class="relative">
                        <span class="absolute inset-y-0 left-0 flex items-center pl-4 text-slate-400"><i class="fa-solid fa-lock"></i></span>
                        <input type="password" id="loginPassword" required class="w-full bg-slate-800/50 border border-slate-600/50 text-white rounded-xl pl-11 pr-12 py-3.5 focus:ring-2 focus:ring-brand-500" placeholder="••••••••">
                        <button type="button" onclick="togglePassword()" class="absolute inset-y-0 right-0 px-4 text-slate-400 hover:text-white">
                            <i id="eyeIcon" class="fa-solid fa-eye"></i>
                        </button>
                    </div>
                </div>
                <button type="submit" class="w-full bg-gradient-to-r from-brand-500 to-red-600 hover:from-brand-400 hover:to-red-500 text-white font-bold py-4 rounded-xl shadow-lg transform hover:scale-[1.02]">
                    <i class="fa-solid fa-right-to-bracket mr-2"></i> Masuk Sistem
                </button>
            </form>
        </div>
    </div>

    <!-- ISI FORM INPUT -->
    <div id="appContent" class="hidden items-center justify-center min-h-screen p-4">
        <div class="w-full max-w-lg">
            <div class="bg-white dark:bg-slate-800 rounded-[1.5rem] shadow-xl p-6 border border-gray-100 dark:border-slate-700">
                <div class="text-center mb-6">
                    <h2 class="text-2xl font-extrabold text-slate-800 dark:text-white flex items-center justify-center gap-2">
                        <span class="bg-brand-100 dark:bg-brand-900/50 text-brand-600 w-10 h-10 rounded-xl flex items-center justify-center"><i class="fa-solid fa-circle-plus"></i></span>
                        Form Input Data Restoran
                    </h2>
                    <p class="text-sm text-slate-500 dark:text-slate-400 mt-2">Semua data disimpan aman ke Google Sheet</p>
                </div>

                <form id="customerForm" class="space-y-5">
                    <div>
                        <label class="block text-sm font-bold mb-1.5 text-slate-700 dark:text-slate-300">Nama Restoran *</label>
                        <input type="text" id="nama" required class="w-full bg-slate-50 dark:bg-slate-900 border border-gray-200 dark:border-slate-700 rounded-xl px-4 py-3.5 focus:ring-2 focus:ring-brand-500" placeholder="Contoh: Rumah Makan Padang Sederhana">
                    </div>

                   
                    <div>
                        <label class="block text-sm font-bold mb-1.5 text-slate-700 dark:text-slate-300">No. Telepon <span class="text-slate-400 font-medium text-xs">(Opsional - Format tetap disimpan sama persis)</span></label>
                        <input type="tel" id="nohp" class="w-full bg-slate-50 dark:bg-slate-900 border border-gray-200 dark:border-slate-700 rounded-xl px-4 py-3.5 focus:ring-2 focus:ring-brand-500" placeholder="08xx-xxxx-xxxx">
                    </div>

                    <div>
                        <label class="block text-sm font-bold mb-1.5 text-slate-700 dark:text-slate-300">Jenis Masakan / Kategori <span class="text-slate-400 font-medium text-xs">(Tulis sendiri bebas)</span></label>
                        <input type="text" id="layanan" class="w-full bg-slate-50 dark:bg-slate-900 border border-gray-200 dark:border-slate-700 rounded-xl px-4 py-3.5 focus:ring-2 focus:ring-brand-500" placeholder="Contoh: Masakan Bugis, Ikan Bakar, Kopi & Kue...">
                    </div>

                    <div>
                        <label class="block text-sm font-bold mb-1.5 text-slate-700 dark:text-slate-300">Alamat Lengkap / Titik Koordinat *</label>
                        <button type="button" onclick="getLocation()" class="mb-3 bg-blue-50 dark:bg-blue-900/20 text-blue-600 dark:text-blue-400 hover:bg-blue-100 dark:hover:bg-blue-900/40 border border-blue-200 dark:border-blue-800/50 px-4 py-2.5 rounded-xl text-sm font-bold w-full transition-colors flex items-center justify-center">
                            <i class="fa-solid fa-location-crosshairs mr-2"></i> Deteksi Titik GPS Otomatis
                        </button>
                        <textarea id="lokasi" required rows="2" class="w-full bg-slate-50 dark:bg-slate-900 border border-gray-200 dark:border-slate-700 rounded-xl px-4 py-3 focus:ring-2 focus:ring-brand-500 resize-none" placeholder="Bisa alamat lengkap atau link/koordinat Google Maps"></textarea>
                    </div>

                    <div>
                        <label class="block text-sm font-bold mb-2 text-slate-700 dark:text-slate-300">Foto Tampak Depan <span class="text-slate-400 font-medium text-xs">(Opsional)</span></label>
                        <div class="grid grid-cols-2 gap-3 mb-3">
                            <button type="button" onclick="bukaGaleri()" class="bg-slate-100 dark:bg-slate-700 hover:bg-slate-200 dark:hover:bg-slate-600 text-slate-700 dark:text-slate-200 py-3 rounded-xl text-sm font-bold transition-colors shadow-sm">
                                <i class="fa-regular fa-image mr-1"></i> Galeri
                            </button>
                            <button type="button" onclick="bukaKamera()" class="bg-brand-50 dark:bg-brand-900/20 hover:bg-brand-100 dark:hover:bg-brand-900/40 text-brand-700 dark:text-brand-400 py-3 rounded-xl text-sm font-bold transition-colors shadow-sm">
                                <i class="fa-solid fa-camera mr-1"></i> Kamera
                            </button>
                        </div>
                        <input type="file" id="foto" accept="image/*" class="hidden">
                        <img id="previewFoto" class="mt-3 hidden w-full h-44 object-cover rounded-2xl border-2 border-dashed border-gray-300 dark:border-slate-600 shadow-sm">
                    </div>

                    <button type="submit" class="w-full bg-slate-800 dark:bg-brand-600 hover:bg-slate-900 dark:hover:bg-brand-500 text-white font-extrabold py-4 rounded-xl text-lg shadow-lg hover:shadow-xl transition-all transform hover:-translate-y-0.5 mt-2">
                        <i class="fa-solid fa-floppy-disk mr-2"></i> Simpan Data Restoran
                    </button>
                </form>
            </div>

            <div class="text-center mt-6">
                <button onclick="keluarKeDaftar()" class="text-sm text-slate-500 dark:text-slate-400 hover:text-brand-500 dark:hover:text-brand-400 font-medium transition-colors">
                    <i class="fa-solid fa-arrow-left mr-1"></i> Kembali ke Daftar Data
                </button>
            </div>
        </div>
    </div>

    <script>
        // --- KONFIGURASI FIREBASE ---
        const _X=btoa('AIzaSyBDp0uFHkL0FvZhQ2KsuWVBtVM034rdtME'),_Y=btoa('datacsgm.firebaseapp.com'),_Z=btoa('https://datacsgm-default-rtdb.asia-southeast1.firebasedatabase.app'),_Q=btoa('datacsgm.firebasestorage.app'),_W=btoa('370220756586'),_V=btoa('1:370220756586:web:f1188256adb659aaee2413');
        const firebaseConfig={apiKey:atob(_X),authDomain:atob(_Y),databaseURL:atob(_Z),storageBucket:atob(_Q),messagingSenderId:atob(_W),appId:atob(_V)};

        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();

        // --- LINK GOOGLE APP SCRIPT ---
        const GS_URL = "https://script.google.com/macros/s/AKfycbyzHX4yTYGHYcmg-YUsssW-Btuc9EqILIZuNafijh7SeiBIQ_zL7tdax4_GVwVk4YG-Bg/exec";

        let fotoBase64 = "";

        // --- FUNGSI BANTUAN ---
        function showLoading() { document.getElementById('loadingOverlay').classList.remove('hidden'); document.getElementById('loadingOverlay').classList.add('flex'); }
        function hideLoading() { document.getElementById('loadingOverlay').classList.add('hidden'); document.getElementById('loadingOverlay').classList.remove('flex'); }

        function togglePassword() {
            const inp = document.getElementById('loginPassword');
            const ico = document.getElementById('eyeIcon');
            inp.type = inp.type === 'password' ? 'text' : 'password';
            ico.className = inp.type === 'password' ? 'fa-solid fa-eye text-brand-400' : 'fa-solid fa-eye text-slate-400';
        }

        // --- CEK STATUS LOGIN ---
        auth.onAuthStateChanged(user => {
            const loginScr = document.getElementById('loginScreen');
            const appScr = document.getElementById('appContent');
            
            if (user) {
                loginScr.classList.add('hidden');
                appScr.classList.remove('hidden');
                appScr.classList.add('flex');
            } else {
                loginScr.classList.remove('hidden');
                appScr.classList.add('hidden');
                appScr.classList.remove('flex');
                fotoBase64 = "";
            }
        });

        // --- PROSES LOGIN ---
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            showLoading();
            const email = document.getElementById('loginEmail').value;
            const pass = document.getElementById('loginPassword').value;
            auth.signInWithEmailAndPassword(email, pass)
                .then(() => hideLoading())
                .catch(err => { 
                    hideLoading(); 
                    Swal.fire({
                        icon:'error',
                        title:'Akses Ditolak',
                        text:'Email atau kata sandi salah!',
                        confirmButtonColor:'#ef4444'
                    }); 
                });
        });

        // --- TOMBOL KEMBALI ---
        function keluarKeDaftar() {
            Swal.fire({
                title: 'Keluar Halaman Input?',
                text: 'Pastikan data sudah disimpan sebelum pindah halaman',
                icon: 'question',
                showCancelButton: true,
                confirmButtonColor: '#ef4444',
                cancelButtonColor: '#64748b',
                confirmButtonText: 'Ya, Lanjut'
            }).then(res => {
                if(res.isConfirmed) {
                    auth.signOut();
                    // Bisa ganti alamat tujuan ke halaman daftar
                    window.location.href = "index.html"; 
                }
            });
        }

        // --- FUNGSI GPS LOKASI ---
        function getLocation() {
            if (navigator.geolocation) {
                Swal.fire({
                    title: 'Mengambil Lokasi...',
                    text: 'Mohon izinkan akses lokasi pada perangkat',
                    icon: 'info',
                    allowOutsideClick: false,
                    showConfirmButton: false
                });
                navigator.geolocation.getCurrentPosition(pos => {
                    const lat = pos.coords.latitude;
                    const lng = pos.coords.longitude;
                    // ✅ Format langsung jadi link Maps yang benar
                    const linkMaps = `https://www.google.com/maps?q=${lat},${lng}`;
                    document.getElementById('lokasi').value = linkMaps;
                    Swal.fire({
                        title: 'Berhasil!',
                        text: 'Koordinat lokasi sudah dimasukkan',
                        icon: 'success',
                        timer: 1600,
                        showConfirmButton: false
                    });
                }, err => {
                    Swal.fire({
                        title: 'Gagal Mendapatkan Lokasi',
                        text: 'Perangkat menolak akses atau sinyal lemah',
                        icon: 'error',
                        confirmButtonColor: '#ef4444'
                    });
                });
            } else {
                Swal.fire({
                    text: 'Perangkat ini tidak mendukung fitur GPS',
                    icon: 'warning',
                    confirmButtonColor: '#ef4444'
                });
            }
        }

        // --- UPLOAD FOTO & KONVERSI BASE64 ---
        function bukaGaleri() { document.getElementById('foto').click(); }
        function bukaKamera() { document.getElementById('foto').click(); }

        document.getElementById('foto').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(evt) {
                    fotoBase64 = evt.target.result;
                    document.getElementById('previewFoto').src = fotoBase64;
                    document.getElementById('previewFoto').classList.remove('hidden');
                };
                reader.readAsDataURL(file);
            }
        });

        // --- ✅ SIMPAN DATA KE GOOGLE SHEET ---
        document.getElementById('customerForm').addEventListener('submit', function(e) {
            e.preventDefault();
            showLoading();

            // ✅ Nomor HP disimpan persis seperti yang diketik, TIDAK DIUBAH FORMAT
            const dataKirim = {
                action: "create",
                nama: document.getElementById('nama').value.trim(),
                nohp: document.getElementById('nohp').value.trim(),
                layanan: document.getElementById('layanan').value.trim(), // ✅ Input manual
                lokasi: document.getElementById('lokasi').value.trim(), // ✅ Bisa alamat biasa atau link/kordinat
                foto: fotoBase64 || ""
            };

            fetch(GS_URL, {
                method: "POST",
                headers: { "Content-Type": "application/x-www-form-urlencoded" },
                body: new URLSearchParams(dataKirim).toString()
            })
            .then(res => res.json())
            .then(hasil => {
                hideLoading();
                if (hasil.status === "SUKSES") {
                    Swal.fire({
                        icon: 'success',
                        title: '✅ Tersimpan!',
                        text: 'Data restoran berhasil masuk ke sistem',
                        confirmButtonColor: '#ef4444'
                    });
                    // Reset form setelah simpan
                    document.getElementById('customerForm').reset();
                    fotoBase64 = "";
                    document.getElementById('previewFoto').classList.add('hidden');
                } else {
                    Swal.fire({
                        icon: 'error',
                        title: '❌ Gagal Menyimpan',
                        text: hasil.pesan || 'Terjadi kendala saat mengirim data',
                        confirmButtonColor: '#ef4444'
                    });
                }
            })
            .catch(err => {
                hideLoading();
                Swal.fire({
                    icon: 'error',
                    title: 'Masalah Koneksi',
                    text: 'Periksa jaringan atau link Google App Script: ' + err.message,
                    confirmButtonColor: '#ef4444'
                });
            });
        });

    </script>
</body>
</html>
