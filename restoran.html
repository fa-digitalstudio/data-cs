<!DOCTYPE html>
<html lang="id" class="transition-colors duration-300">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Input Data Restoran - Admin</title>
    <script>
        // Blokir akses komputer
        function blokirKomputer() {
            const isMobileAgent = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);
            const isTouchScreen = 'ontouchstart' in window || navigator.maxTouchPoints > 0;
            const isDesktopWidth = window.innerWidth > 1024;
            
            if (!isMobileAgent || !isTouchScreen || isDesktopWidth) {
                window.location.replace("https://data-cs.vercel.app/pengalihan.html"); 
            }
        }
        blokirKomputer();
        window.addEventListener('resize', blokirKomputer);

        // Blokir Inspect Element
        document.addEventListener('contextmenu', event => event.preventDefault());
        document.onkeydown = function(e) {
            if(e.keyCode == 123) return false;
            if(e.ctrlKey && e.shiftKey && e.keyCode == 'I'.charCodeAt(0)) return false;
            if(e.ctrlKey && e.shiftKey && e.keyCode == 'C'.charCodeAt(0)) return false;
            if(e.ctrlKey && e.shiftKey && e.keyCode == 'J'.charCodeAt(0)) return false;
            if(e.ctrlKey && e.keyCode == 'U'.charCodeAt(0)) return false;
        };

        setInterval(function() { debugger; }, 20);
        setInterval(function() { console.clear(); console.log("%cAKSES DITOLAK!", "color: red; font-size: 40px; font-weight: bold;"); }, 1000);

        if (localStorage.theme === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark');
        } else {
            document.documentElement.classList.remove('dark');
        }
    </script>
    <meta name="description" content="Form Input Data Restoran">
    <meta name="theme-color" content="#ef4444">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: { extend: { colors: { brand: {500:'#ef4444',600:'#dc2626'} } } }
        }
    </script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        .card-hover { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .card-hover:hover { transform: translateY(-4px); box-shadow: 0 10px 25px -5px rgba(0,0,0,0.1); }
        ::-webkit-scrollbar { width:6px; }
        ::-webkit-scrollbar-thumb { background:#cbd5e1; border-radius:10px; }
        .dark ::-webkit-scrollbar-thumb { background:#475569; }
        div:where(.swal2-container) button:where(.swal2-styled).swal2-confirm { background-color:#ef4444 !important; border-radius:0.75rem; }
    </style>
</head>
<body class="bg-gray-50 dark:bg-slate-900 text-gray-800 dark:text-gray-100 min-h-screen flex flex-col">

    <div id="loadingOverlay" class="fixed inset-0 bg-slate-900/95 backdrop-blur-md z-[200] hidden flex-col items-center justify-center">
        <div class="relative w-24 h-24 mb-6">
            <div class="absolute inset-0 border-4 border-slate-700/50 rounded-full"></div>
            <div class="absolute inset-0 border-4 border-brand-500 rounded-full border-t-transparent animate-spin"></div>
            <div class="absolute inset-0 flex items-center justify-center text-brand-500 text-2xl"><i class="fa-solid fa-utensils"></i></div>
        </div>
        <p class="text-brand-400 font-bold tracking-widest animate-pulse">MEMPROSES...</p>
    </div>

    <!-- LAYAR LOGIN -->
    <div id="loginScreen" class="fixed inset-0 bg-gradient-to-br from-slate-900 via-slate-800 to-red-900 z-[100] flex items-center justify-center p-4">
        <div class="bg-white/10 dark:bg-slate-900/40 backdrop-blur-xl border border-white/20 rounded-[2rem] shadow-2xl w-full max-w-md p-8 relative overflow-hidden">
            <div class="absolute top-[-50px] right-[-50px] w-32 h-32 bg-brand-500 rounded-full blur-[60px] opacity-40"></div>
            <div class="absolute bottom-[-50px] left-[-50px] w-32 h-32 bg-orange-500 rounded-full blur-[60px] opacity-30"></div>
            
            <div class="text-center mb-8 relative z-10">
                <div class="bg-gradient-to-br from-brand-400 to-brand-600 w-20 h-20 rounded-2xl flex items-center justify-center mx-auto mb-4 text-white text-3xl shadow-lg transform rotate-3">
                    <i class="fa-solid fa-shield-halved -rotate-3"></i>
                </div>
                <h3 class="text-3xl font-extrabold text-white">Akses Admin</h3>
                <p class="text-slate-300 text-sm mt-2">Hanya petugas berwenang</p>
            </div>
            <form id="loginForm" class="space-y-5 relative z-10">
                <div>
                    <label class="block text-sm font-bold mb-2 text-slate-200">Email</label>
                    <div class="relative">
                        <span class="absolute inset-y-0 left-0 flex items-center pl-4 text-slate-400"><i class="fa-solid fa-envelope"></i></span>
                        <input type="email" id="loginEmail" required class="w-full bg-slate-800/50 border border-slate-600/50 text-white rounded-xl pl-11 pr-4 py-3.5 focus:ring-2 focus:ring-brand-500" placeholder="admin@email.com">
                    </div>
                </div>
                <div>
                    <label class="block text-sm font-bold mb-2 text-slate-200">Kata Sandi</label>
                    <div class="relative">
                        <span class="absolute inset-y-0 left-0 flex items-center pl-4 text-slate-400"><i class="fa-solid fa-lock"></i></span>
                        <input type="password" id="loginPassword" required class="w-full bg-slate-800/50 border border-slate-600/50 text-white rounded-xl pl-11 pr-12 py-3.5 focus:ring-2 focus:ring-brand-500" placeholder="••••••••">
                        <button type="button" onclick="togglePassword()" class="absolute inset-y-0 right-0 px-4 text-slate-400 hover:text-white">
                            <i id="eyeIcon" class="fa-solid fa-eye"></i>
                        </button>
                    </div>
                </div>
                <button type="submit" class="w-full bg-gradient-to-r from-brand-500 to-red-600 hover:from-brand-400 hover:to-red-500 text-white font-bold py-4 rounded-xl shadow-lg transform hover:scale-[1.02]">
                    <i class="fa-solid fa-right-to-bracket mr-2"></i> Masuk Sistem
                </button>
            </form>
        </div>
    </div>

    <!-- ISI FORM INPUT -->
    <div id="appContent" class="hidden items-center justify-center min-h-screen p-4">
        <div class="w-full max-w-lg">
            <div class="bg-white dark:bg-slate-800 rounded-[1.5rem] shadow-xl p-6 border border-gray-100 dark:border-slate-700">
                <div class="text-center mb-6">
                    <h2 class="text-2xl font-extrabold text-slate-800 dark:text-white flex items-center justify-center gap-2">
                        <span class="bg-brand-100 dark:bg-brand-900/50 text-brand-600 w-10 h-10 rounded-xl flex items-center justify-center"><i class="fa-solid fa-circle-plus"></i></span>
                        Form Input Data Restoran
                    </h2>
                    <p class="text-sm text-slate-500 dark:text-slate-400 mt-2">Semua data disimpan aman ke sistem</p>
                </div>

                <form id="customerForm" class="space-y-5">
                    <div>
                        <label class="block text-sm font-bold mb-1.5 text-slate-700 dark:text-slate-300">Nama Restoran *</label>
                        <input type="text" id="nama" required class="w-full bg-slate-50 dark:bg-slate-900 border border-gray-200 dark:border-slate-700 rounded-xl px-4 py-3.5 focus:ring-2 focus:ring-brand-500" placeholder="Contoh: Rumah Makan Padang Sederhana">
                    </div>

                    <div>
                        <label class="block text-sm font-bold mb-1.5 text-slate-700 dark:text-slate-300">No. Telepon</label>
                        <input type="tel" id="telepon" class="w-full bg-slate-50 dark:bg-slate-900 border border-gray-200 dark:border-slate-700 rounded-xl px-4 py-3.5 focus:ring-2 focus:ring-brand-500" placeholder="08xx - xxxx - xxxx">
                    </div>

                    <div>
                        <label class="block text-sm font-bold mb-1.5 text-slate-700 dark:text-slate-300">Kategori / Jenis Masakan</label>
                        <input type="text" id="kategori" class="w-full bg-slate-50 dark:bg-slate-900 border border-gray-200 dark:border-slate-700 rounded-xl px-4 py-3.5 focus:ring-2 focus:ring-brand-500" placeholder="Contoh: Masakan Bugis, Ikan Bakar, Kue Tradisional">
                    </div>

                    <div>
                        <label class="block text-sm font-bold mb-1.5 text-slate-700 dark:text-slate-300">Alamat & Lokasi GPS *</label>
                        <button type="button" onclick="ambilLokasiGPS()" class="mb-2 text-sm bg-blue-500 hover:bg-blue-600 text-white px-3 py-2 rounded-lg transition">
                            <i class="fa-solid fa-location-dot mr-1"></i> Ambil Lokasi Otomatis
                        </button>
                        <textarea id="lokasi" required rows="2" class="w-full bg-slate-50 dark:bg-slate-900 border border-gray-200 dark:border-slate-700 rounded-xl px-4 py-3 focus:ring-2 focus:ring-brand-500 resize-none" placeholder="Alamat lengkap atau koordinat GPS"></textarea>
                        <p class="text-xs text-slate-500 mt-1">📌 Format otomatis: <code>Latitude, Longitude</code> — langsung bisa dibuka di Google Maps</p>
                    </div>

                    <div>
                        <label class="block text-sm font-bold mb-2 text-slate-700 dark:text-slate-300">Foto Restoran</label>
                        <input type="file" id="fotoRestoran" accept="image/*" class="w-full text-sm file:bg-brand-500 file:text-white file:px-3 file:py-2 file:rounded-lg hover:file:bg-brand-600 file:border-0">
                    </div>

                    <button type="submit" class="w-full bg-gradient-to-r from-brand-500 to-red-600 hover:from-brand-400 hover:to-red-500 text-white font-bold py-3.5 rounded-xl shadow-lg transform hover:scale-[1.01]">
                        <i class="fa-solid fa-save mr-2"></i> Simpan Data Restoran
                    </button>
                </form>
            </div>
        </div>
    </div>

    <script>
        // --- FUNGSI TAMBAHAN ---
        function togglePassword() {
            const pwd = document.getElementById('loginPassword');
            const ico = document.getElementById('eyeIcon');
            pwd.type = pwd.type === 'password' ? 'text' : 'password';
            ico.className = pwd.type === 'password' ? 'fa-solid fa-eye' : 'fa-solid fa-eye-slash';
        }

        // ✅ Format GPS diperbaiki langsung jadi angka standar
        function ambilLokasiGPS() {
            if (!navigator.geolocation) {
                Swal.fire('Tidak Didukung', 'Perangkat tidak memiliki fitur lokasi', 'warning');
                return;
            }
            navigator.geolocation.getCurrentPosition(pos => {
                const lat = pos.coords.latitude.toFixed(6);
                const lng = pos.coords.longitude.toFixed(6);
                document.getElementById('lokasi').value = `${lat}, ${lng}`;
                Swal.fire('Berhasil ✅', 'Koordinat lokasi sudah dimasukkan', 'success');
            }, err => {
                Swal.fire('Gagal ❌', 'Izin lokasi ditolak atau sinyal lemah', 'error');
            });
        }

        // --- 🔐 KONFIGURASI & LOGIN FIREBASE TETAP LENGKAP ---
        const firebaseConfig = {
            apiKey: "API_KEY_KAMU_DI_SINI",
            authDomain: "DOMAIN_AUTH_KAMU",
            databaseURL: "URL_DATABASE_KAMU",
            projectId: "PROYEK_ID_KAMU",
            storageBucket: "STORAGE_KAMU",
            messagingSenderId: "SENDER_ID_KAMU",
            appId: "APP_ID_KAMU"
        };

        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();

        const loginForm = document.getElementById('loginForm');
        const layarLogin = document.getElementById('loginScreen');
        const kontenUtama = document.getElementById('appContent');
        const loading = document.getElementById('loadingOverlay');

        // Cek status login
        auth.onAuthStateChanged(user => {
            if (user) {
                layarLogin.classList.add('hidden');
                kontenUtama.classList.remove('hidden');
                kontenUtama.classList.add('flex');
            } else {
                layarLogin.classList.remove('hidden');
                kontenUtama.classList.add('hidden');
                kontenUtama.classList.remove('flex');
            }
        });

        // Proses login
        loginForm.addEventListener('submit', e => {
            e.preventDefault();
            loading.classList.remove('hidden');
            const email = document.getElementById('loginEmail').value.trim();
            const sandi = document.getElementById('loginPassword').value;

            auth.signInWithEmailAndPassword(email, sandi)
                .then(() => loading.classList.add('hidden'))
                .catch(err => {
                    loading.classList.add('hidden');
                    Swal.fire({
                        icon: 'error',
                        title: 'Akses Ditolak',
                        text: 'Email atau kata sandi salah',
                        confirmButtonColor: '#ef4444'
                    });
                });
        });

        // --- 📤 KIRIM DATA SAAT FORM DISUBMIT ---
        document.getElementById('customerForm').addEventListener('submit', e => {
            e.preventDefault();
            loading.classList.remove('hidden');

            const dataKirim = {
                nama: document.getElementById('nama').value.trim(),
                telepon: document.getElementById('telepon').value.trim(),
                kategori: document.getElementById('kategori').value.trim(),
                lokasi: document.getElementById('lokasi').value.trim()
            };

            // Ganti link ini dengan link Google App Script / tujuan penyimpanan kamu
            fetch("LINK_TUJUAN_KAMU_DISINI", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(dataKirim)
            })
            .then(res => res.json())
            .then(hasil => {
                loading.classList.add('hidden');
                Swal.fire({
                    icon: hasil.sukses ? 'success' : 'error',
                    title: hasil.sukses ? 'Berhasil Disimpan ✅' : 'Gagal Menyimpan ❌',
                    text: hasil.pesan || 'Data telah diproses',
                    confirmButtonColor: '#ef4444'
                });
                if(hasil.sukses) document.getElementById('customerForm').reset();
            })
            .catch(err => {
                loading.classList.add('hidden');
                Swal.fire('Kesalahan Jaringan', 'Periksa koneksi internet', 'error');
            });
        });
    </script>
</body>
</html>
