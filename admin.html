<!DOCTYPE html>
<html lang="id" class="transition-colors duration-300">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Sistem Data Customer</title>
    
    <script>
                // SCRIPT MENU GARIS TIGA & MODE GELAP
        function toggleMenu() {
            const menu = document.getElementById('dropdownMenu');
            menu.classList.toggle('hidden');
            menu.classList.toggle('flex');
            
            const html = document.documentElement;
            const themeIcon = document.getElementById('themeIcon');
            const themeText = document.getElementById('themeText');
            if (html.classList.contains('dark')) {
                themeIcon.classList.replace('fa-moon', 'fa-sun');
                themeIcon.classList.replace('text-indigo-500', 'text-yellow-400');
                themeText.textContent = 'Mode Terang';
            } else {
                themeIcon.classList.replace('fa-sun', 'fa-moon');
                themeIcon.classList.replace('text-yellow-400', 'text-indigo-500');
                themeText.textContent = 'Mode Gelap';
            }
        }

        document.addEventListener('click', function(event) {
            const menu = document.getElementById('dropdownMenu');
            const button = event.target.closest('button[onclick="toggleMenu()"]');
            if (!button && !menu.contains(event.target)) {
                menu.classList.add('hidden');
                menu.classList.remove('flex');
            }
        });

        function toggleDarkMode() {
            const html = document.documentElement;
            const themeIcon = document.getElementById('themeIcon');
            const themeText = document.getElementById('themeText');
            
            if (html.classList.contains('dark')) {
                html.classList.remove('dark');
                localStorage.setItem('theme', 'light');
                themeIcon.classList.replace('fa-sun', 'fa-moon');
                themeIcon.classList.replace('text-yellow-400', 'text-indigo-500');
                themeText.textContent = 'Mode Gelap';
            } else {
                html.classList.add('dark');
                localStorage.setItem('theme', 'dark');
                themeIcon.classList.replace('fa-moon', 'fa-sun');
                themeIcon.classList.replace('text-indigo-500', 'text-yellow-400');
                themeText.textContent = 'Mode Terang';
            }
        }

        // KONFIGURASI FIREBASE (CUMA BUAT LOGIN, DATA TIDAK DISIMPAN DI SINI LAGI)
        const _X=btoa('AIzaSyBDp0uFHkL0FvZhQ2KsuWVBtVM034rdtME'),_Y=btoa('datacsgm.firebaseapp.com'),_Z=btoa('https://datacsgm-default-rtdb.asia-southeast1.firebasedatabase.app'),_Q=btoa('datacsgm.firebasestorage.app'),_W=btoa('370220756586'),_V=btoa('1:370220756586:web:f1188256adb659aaee2413');const firebaseConfig={apiKey:atob(_X),authDomain:atob(_Y),databaseURL:atob(_Z),storageBucket:atob(_Q),messagingSenderId:atob(_W),appId:atob(_V)};

        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        // const db = firebase.database(); // <-- DIMATIKAN, TIDAK DIPAKAI LAGI UNTUK DATA

        // ✅ URL GOOGLE SCRIPT (TAMBAHKAN FUNGSI BACA DATA DI SINI)
        const GS_DEPLOY_URL = "https://script.google.com/macros/s/AKfycbwodCyS1L7FksUtN1LUYgKMFkSSEe-XqLslul64frJxu2P8aSRt5YfUdPAF0U0ZI8TX1w/exec";

        let fotoBase64 = "";
        let itemsToShow = 5; 
        let semuaData = [];
        let asliSemuaData = [];

        function showLoading() { document.getElementById('loadingOverlay').classList.remove('hidden'); document.getElementById('loadingOverlay').classList.add('flex'); }
        function hideLoading() { document.getElementById('loadingOverlay').classList.add('hidden'); document.getElementById('loadingOverlay').classList.remove('flex'); }

        function togglePassword() {
            const inp = document.getElementById('loginPassword');
            const ico = document.getElementById('eyeIcon');
            inp.type = inp.type === 'password' ? 'text' : 'password';
            ico.className = inp.type === 'password' ? 'fa-solid fa-eye text-brand-400' : 'fa-solid fa-eye text-slate-400';
        }

        auth.onAuthStateChanged(user => {
            const loginScr = document.getElementById('loginScreen');
            const appScr = document.getElementById('appContent');
            
            if (user) {
                loginScr.classList.add('hidden');
                appScr.classList.remove('hidden');
                appScr.classList.add('flex');
                ambilDataDariSheet(); // <-- AMBIL DATA DARI SHEETS, BUKAN FIREBASE
            } else {
                loginScr.classList.remove('hidden');
                appScr.classList.add('hidden');
                appScr.classList.remove('flex');
                hideLoading();
            }
        });

        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            showLoading();
            const email = document.getElementById('loginEmail').value;
            const pass = document.getElementById('loginPassword').value;
            auth.signInWithEmailAndPassword(email, pass)
                .then(() => hideLoading())
                .catch(err => { hideLoading(); Swal.fire({icon:'error',title:'Akses Ditolak',text:'Kredensial tidak valid!',confirmButtonColor:'#10b981'}); });
        });

        function logoutFirebase() {
            document.getElementById('dropdownMenu').classList.add('hidden');
            Swal.fire({title:'Keluar Sistem?',text:'Sesi Anda akan diakhiri.',icon:'warning',showCancelButton:true,confirmButtonColor:'#1e293b',cancelButtonColor:'#ef4444', confirmButtonText: 'Ya, Keluar'})
            .then(res => { if(res.isConfirmed){ showLoading(); auth.signOut().then(hideLoading); } });
        }

        // ==========================================
        // ✅ FUNGSI BARU: AMBIL DATA LANGSUNG DARI GOOGLE SHEETS
        // ==========================================
        function ambilDataDariSheet() {
            const wadah = document.getElementById('dataContainer');
            const infoJml = document.getElementById('totalData');

            wadah.innerHTML = `<div class="col-span-full flex flex-col items-center justify-center py-20 text-slate-500 dark:text-slate-400 bg-white dark:bg-slate-800 rounded-[1.5rem] border border-gray-100 dark:border-slate-700 shadow-sm"><i class="fa-solid fa-circle-notch fa-spin text-4xl mb-4 text-brand-500"></i><p class="font-bold">Menarik data dari Google Sheets...</p></div>`;

            // PANGGIL GS UNTUK BACA DATA
            fetch(GS_DEPLOY_URL + "?action=read", {
                method: 'GET',
                headers: { 'Content-Type': 'application/json' }
            })
            .then(res => res.json())
            .then(dataSheet => {
                asliSemuaData = [];
                if (dataSheet.status === "SUKSES" && dataSheet.data.length > 0) {
                    // UBAH FORMAT AGAR SESUAI DENGAN TAMPILAN
                    dataSheet.data.forEach(baris => {
                        asliSemuaData.push({
                            id: baris.id || Date.now(),
                            nama: baris.nama || 'Tanpa Nama',
                            nohp: baris.nohp || '',
                            layanan: baris.layanan || 'Tidak Diketahui',
                            lokasi: baris.lokasi || 'Tidak Ada Lokasi',
                            foto: baris.foto || 'https://via.placeholder.com/400x400?text=Tanpa+Foto'
                        });
                    });
                    asliSemuaData.reverse(); // URUTAN TERBARU DI ATAS
                }

                semuaData = [...asliSemuaData];
                infoJml.innerText = `${semuaData.length} Data Terdeteksi`;
                itemsToShow = 5; 
                tampilkanKartu();
            })
            .catch(err => {
                wadah.innerHTML = `<div class="col-span-full flex flex-col items-center justify-center py-16 text-red-500 dark:text-red-400 bg-red-50 dark:bg-red-900/20 rounded-[1.5rem] border border-red-100 dark:border-red-900/50"><i class="fa-solid fa-triangle-exclamation text-4xl mb-3"></i><p class="font-bold">Gagal memuat: ${err.message}</p></div>`;
            });
        }

        // TAMPILKAN KARTU LIMIT 5
        function tampilkanKartu() {
            const wadah = document.getElementById('dataContainer');
            const btnLebih = document.getElementById('loadMoreContainer');

            if (semuaData.length === 0) {
                wadah.innerHTML = `<div class="col-span-full flex flex-col items-center justify-center py-20 text-slate-500 dark:text-slate-400 bg-white dark:bg-slate-800 rounded-[1.5rem] border border-gray-100 dark:border-slate-700 shadow-sm">
                    <div class="bg-slate-100 dark:bg-slate-700 w-20 h-20 rounded-full flex items-center justify-center mb-4">
                        <i class="fa-solid fa-folder-open text-4xl text-slate-400 dark:text-slate-500"></i>
                    </div>
                    <p class="font-bold text-lg text-slate-700 dark:text-slate-300">Belum ada data pelanggan</p>
                    <p class="text-sm mt-1">Mulai tambahkan data untuk memudahkan kerja</p>
                </div>`;
                btnLebih.classList.add('hidden');
                return;
            }

            let html = '';
            const dataTampil = semuaData.slice(0, itemsToShow);

            dataTampil.forEach(cust => {
                const warnaBadge = cust.layanan === 'Grab' ? 'bg-gradient-to-r from-brand-500 to-emerald-500 text-white shadow-brand-500/30' : cust.layanan === 'Maxim' ? 'bg-gradient-to-r from-yellow-400 to-amber-500 text-amber-950 shadow-amber-500/30' : 'bg-gradient-to-r from-slate-600 to-slate-700 text-white shadow-slate-500/30';
                const ikon = cust.layanan === 'Grab' ? 'fa-car' : cust.layanan === 'Maxim' ? 'fa-motorcycle' : 'fa-user-check';
                const mapsUrl = `https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(cust.lokasi)}`;

                html += `
                <div class="bg-white dark:bg-slate-800 rounded-[1.5rem] shadow-sm hover:shadow-xl dark:shadow-none border border-gray-100 dark:border-slate-700 p-5 card-hover group relative overflow-hidden">
                    <div class="absolute -top-10 -right-10 w-24 h-24 bg-brand-500/10 rounded-full blur-2xl group-hover:bg-brand-500/20 transition-all"></div>
                    
                    <div class="flex items-start gap-4 relative z-10">
                        <img src="${cust.foto}" alt="Foto" class="w-16 h-16 rounded-2xl object-cover border border-gray-200 dark:border-slate-600 shadow-sm">
                        <div class="flex-1 min-w-0">
                            <div class="flex justify-between items-start gap-2 mb-1.5">
                                <h3 class="font-extrabold text-lg truncate text-slate-800 dark:text-white">${cust.nama}</h3>
                                <span class="${warnaBadge} text-[10px] font-extrabold px-2.5 py-1 rounded-lg shadow-sm whitespace-nowrap">
                                    <i class="fa-solid ${ikon} mr-1"></i>${cust.layanan}
                                </span>
                            </div>
                            <p class="text-sm text-slate-600 dark:text-slate-400 mb-1 font-medium truncate"><i class="fa-solid fa-phone mr-1.5 text-slate-400"></i> ${cust.nohp || 'Tidak ada nomor'}</p>
                            <p class="text-sm text-slate-600 dark:text-slate-400 font-medium truncate"><i class="fa-solid fa-map-location-dot mr-1.5 text-brand-500"></i> ${cust.lokasi}</p>
                        </div>
                    </div>
                    <div class="mt-5 grid grid-cols-3 gap-2.5 relative z-10">
                        <button onclick="bukaDetail('${cust.id}')" class="bg-blue-50 dark:bg-blue-900/20 text-blue-600 dark:text-blue-400 hover:bg-blue-600 hover:text-white dark:hover:bg-blue-600 dark:hover:text-white py-2.5 rounded-xl text-xs sm:text-sm font-bold transition-all border border-transparent hover:border-blue-600">
                            <i class="fa-solid fa-eye mr-1"></i> Lihat
                        </button>
                        <a href="${mapsUrl}" target="_blank" class="text-center bg-brand-50 dark:bg-brand-900/20 text-brand-700 dark:text-brand-400 hover:bg-brand-600 hover:text-white dark:hover:bg-brand-600 dark:hover:text-white py-2.5 rounded-xl text-xs sm:text-sm font-bold transition-all border border-transparent hover:border-brand-600">
                            <i class="fa-solid fa-location-arrow mr-1"></i> Maps
                        </a>
                        <button onclick="hapusData('${cust.id}')" class="bg-red-50 dark:bg-red-900/20 text-red-600 dark:text-red-400 hover:bg-red-600 hover:text-white dark:hover:bg-red-600 dark:hover:text-white py-2.5 rounded-xl text-xs sm:text-sm font-bold transition-all border border-transparent hover:border-red-600">
                            <i class="fa-solid fa-trash-can mr-1"></i> Hapus
                        </button>
                    </div>
                </div>`;
            });

            wadah.innerHTML = html;

            if (semuaData.length > itemsToShow) {
                btnLebih.classList.remove('hidden');
            } else {
                btnLebih.classList.add('hidden');
            }
        }

        function loadMore() {
            itemsToShow += 5;
            tampilkanKartu();
        }

        // CARI DATA
        document.getElementById('searchInput').addEventListener('input', function(e) {
            const kata = e.target.value.trim().toLowerCase();
            if(!kata) { 
                semuaData = [...asliSemuaData]; 
            }
            else {
                semuaData = asliSemuaData.filter(x => 
                    x.nama.toLowerCase().includes(kata) ||
                    x.nohp.toLowerCase().includes(kata) ||
                    x.lokasi.toLowerCase().includes(kata) ||
                    x.layanan.toLowerCase().includes(kata)
                );
            }
            document.getElementById('totalData').innerText = `${semuaData.length} Data Terdeteksi`;
            itemsToShow = 5; 
            tampilkanKartu();
        });

        function muatUlangData() { ambilDataDariSheet(); }

        let slideIndex = 0;
        const slides = document.querySelectorAll('.slide');
        function showSlides() {
            slides.forEach(s=>s.classList.remove('active'));
            slideIndex++; if(slideIndex>slides.length) slideIndex=1;
            slides[slideIndex-1].classList.add('active');
            setTimeout(showSlides,5000);
        }
        showSlides();

        function bukaGaleri(){ document.getElementById('foto').removeAttribute('capture'); document.getElementById('foto').click(); }
        function bukaKamera(){ document.getElementById('foto').setAttribute('capture','environment'); document.getElementById('foto').click(); }

        async function kompresGambar(file, kualitas=0.2, lebar=900){
            return new Promise(res=>{
                const c=document.createElement('canvas'); const ctx=c.getContext('2d'); const i=new Image();
                i.onload=()=>{ let w=i.width,h=i.height; if(w>lebar){h=Math.round(h*lebar/w);w=lebar;} c.width=w;c.height=h;ctx.drawImage(i,0,0,w,h); res(c.toDataURL('image/jpeg',kualitas)); };
                i.src=URL.createObjectURL(file);
            });
        }

        document.getElementById('foto').addEventListener('change', async function(e){
            const f=e.target.files[0]; if(!f) return;
            showLoading(); fotoBase64=await kompresGambar(f);
            document.getElementById('previewFoto').src=fotoBase64; document.getElementById('previewFoto').classList.remove('hidden'); hideLoading();
        });

        function getLocation(){
            if(!navigator.geolocation){ Swal.fire({icon:'info',text:'GPS tidak didukung',confirmButtonColor:'#10b981'}); return; }
            const lok=document.getElementById('lokasi'); lok.value="Menyinkronkan koordinat...";
            
            const opsiGPS = { enableHighAccuracy: true, timeout: 15000, maximumAge: 0 };
            
            navigator.geolocation.getCurrentPosition(pos=>{
                lok.value = `${pos.coords.latitude}, ${pos.coords.longitude}`;
                fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${pos.coords.latitude}&lon=${pos.coords.longitude}&accept-language=id`)
                .then(r=>r.json()).then(d=>{ lok.value += "\n"+(d.display_name||''); }).catch(()=>{});
            },err=>{ lok.value="Gagal mendapatkan lokasi presisi, pastikan GPS Anda aktif dan berada di area terbuka"; }, opsiGPS);
        }

        // ✅ SIMPAN DATA KE SHEETS SAJA, TIDAK SENTUH FIREBASE LAGI
        document.getElementById('customerForm').addEventListener('submit', function(e){
            e.preventDefault(); showLoading();
            const dataBaru = {
                id: Date.now().toString(),
                nama: document.getElementById('nama').value.trim(),
                nohp: document.getElementById('nohp').value.trim(),
                layanan: document.getElementById('layanan').value,
                lokasi: document.getElementById('lokasi').value.trim(),
                foto: fotoBase64 || 'https://via.placeholder.com/400x400?text=Tanpa+Foto'
            };

            // KIRIM KE GOOGLE SHEETS SAJA
            fetch(GS_DEPLOY_URL, {
                method: 'POST',
                mode: 'no-cors',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ data: [dataBaru] })
            })
            .then(() => {
                this.reset(); 
                fotoBase64 = ""; 
                document.getElementById('previewFoto').classList.add('hidden'); 
                hideLoading();
                Swal.fire({
                    icon: 'success',
                    title: 'BERHASIL DISIMPAN! ✅',
                    html: `
                        <p>✅ Data masuk ke Google Sheets.</p>
                        <p>✅ Data langsung muncul di daftar.</p>
                        <p>✅ Firebase KOSONG & RINGAN!</p>
                    `,
                    confirmButtonColor: '#10b981'
                });
                muatUlangData(); // BACA ULANG DARI SHEET AGAR MUNCUL
            })
            .catch(err => { 
                hideLoading(); 
                Swal.fire({icon:'error',title:'Gagal Menyimpan',text:err.message,confirmButtonColor:'#ef4444'}); 
            });
        });

        function bukaDetail(id){
            const d = asliSemuaData.find(x=>x.id===id); if(!d) return;
            document.getElementById('modalFoto').src=d.foto; document.getElementById('modalNama').textContent=d.nama;
            document.getElementById('modalNoHP').textContent=d.nohp||'Tidak ada nomor handphone';
            document.getElementById('modalBtnWA').href = `https://wa.me/62${(d.nohp||'').replace(/^0/,'')}`;
            document.getElementById('modalBtnMaps').href = `https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(d.lokasi)}`;
            
            const modal = document.getElementById('waModal');
            const modalContent = document.getElementById('waModalContent');
            modal.classList.remove('hidden');
            setTimeout(() => {
                modal.classList.remove('opacity-0');
                modalContent.classList.remove('scale-95');
                modalContent.classList.add('scale-100');
            }, 10);
        }
        
        function closeModal(){ 
            const modal = document.getElementById('waModal');
            const modalContent = document.getElementById('waModalContent');
            modal.classList.add('opacity-0');
            modalContent.classList.remove('scale-95');
            modalContent.classList.add('scale-95');
            setTimeout(() => {
                modal.classList.add('hidden');
            }, 300);
        }
        
        document.getElementById('waModal').addEventListener('click',e=>{ if(e.target.id==='waModal') closeModal(); });

        // ✅ HAPUS DATA: HAPUS LANGSUNG DI GOOGLE SHEETS
        function hapusData(id){
            Swal.fire({title:'Hapus Data?',text:'Data pelanggan akan dihapus permanen dari Sheet',icon:'warning',showCancelButton:true,confirmButtonColor:'#ef4444',cancelButtonColor:'#64748b',confirmButtonText:'Ya, Hapus'})
            .then(r=>{ 
                if(r.isConfirmed){ 
                    showLoading(); 
                    // KIRIM PERINTAH HAPUS KE GS
                    fetch(GS_DEPLOY_URL + "?action=delete&id=" + id, { method: 'GET' })
                    .then(res => res.json())
                    .then(() => {
                        hideLoading();
                        muatUlangData(); // REFRESH DAFTAR
                    });
                } 
            });
        }

        function formatWA(n){ return n? n.replace(/^0/,'62').replace(/\D/g,'') : ''; }
    </script>
</html>
