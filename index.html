<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Input Data Customer</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: { primary: '#00B14F' },
                    fontFamily: { sans: ['Plus Jakarta Sans', 'sans-serif'] }
                }
            }
        }
    </script>
    <style>
        body { background-color: #f8fafc; font-family: 'Plus Jakarta Sans', sans-serif; }
    </style>
</head>
<body class="text-slate-700 min-h-screen flex flex-col">

    <header class="bg-primary text-white shadow-md sticky top-0 z-50">
        <div class="container mx-auto px-4 py-4 flex items-center justify-between">
            <h1 class="text-xl font-bold flex items-center gap-2">
                <i class="fa-solid fa-user-plus"></i> Input Data Baru
            </h1>
            <a href="halaman_data.html" class="text-sm bg-white/20 px-3 py-1.5 rounded-lg hover:bg-white/30 transition">
                <i class="fa-solid fa-table-list mr-1"></i> Lihat Data
            </a>
        </div>
    </header>

    <main class="container mx-auto px-4 py-8 max-w-lg flex-grow">
        <form id="formInput" class="bg-white rounded-2xl shadow-lg p-6 space-y-5">
            
            <!-- NAMA -->
            <div>
                <label class="block text-sm font-semibold text-slate-600 mb-2">Nama Lengkap</label>
                <input type="text" id="nama" class="w-full border border-slate-200 rounded-xl px-4 py-3 focus:ring-2 focus:ring-primary/50 focus:border-primary transition" placeholder="Contoh: Budi Santoso" required>
            </div>

            <!-- NO HP -->
            <div>
                <label class="block text-sm font-semibold text-slate-600 mb-2">Nomor Handphone</label>
                <input type="tel" id="nohp" class="w-full border border-slate-200 rounded-xl px-4 py-3 focus:ring-2 focus:ring-primary/50 focus:border-primary transition" placeholder="Contoh: 08123456789" required>
            </div>

            <!-- LAYANAN -->
            <div>
                <label class="block text-sm font-semibold text-slate-600 mb-2">Jenis Layanan</label>
                <select id="layanan" class="w-full border border-slate-200 rounded-xl px-4 py-3 focus:ring-2 focus:ring-primary/50 focus:border-primary transition" required>
                    <option value="">-- Pilih Layanan --</option>
                    <option value="Grab">Grab</option>
                    <option value="Gojek">Gojek</option>
                    <option value="Maxim">Maxim</option>
                    <option value="Lainnya">Lainnya</option>
                </select>
            </div>

            <!-- LOKASI -->
            <div>
                <label class="block text-sm font-semibold text-slate-600 mb-2">Lokasi / Alamat</label>
                <textarea id="lokasi" rows="3" class="w-full border border-slate-200 rounded-xl px-4 py-3 focus:ring-2 focus:ring-primary/50 focus:border-primary transition" placeholder="Masukkan alamat lengkap atau koordinat maps..." required></textarea>
            </div>

            <!-- FOTO -->
            <div>
                <label class="block text-sm font-semibold text-slate-600 mb-2">Upload Foto</label>
                <input type="file" id="fotoInput" accept="image/*" class="w-full text-sm text-slate-500 file:mr-2 file:py-2 file:px-3 file:rounded-lg file:border-0 file:bg-primary/10 file:text-primary hover:file:bg-primary/20 transition">
                <input type="hidden" id="linkFoto" value="">
            </div>

            <button type="submit" class="w-full bg-primary hover:bg-primary/90 text-white font-bold py-3.5 rounded-xl transition-all shadow-lg hover:shadow-xl active:scale-[0.98] mt-4">
                <i class="fa-solid fa-paper-plane mr-2"></i> SIMPAN DATA KE SHEETS
            </button>

        </form>
    </main>

    <script>
        // ==========================================
        // ✅ GANTI BAGIAN INI DENGAN URL MILIK KAMU
        const GS_DEPLOY_URL = "https://script.google.com/macros/s/AKfycbwB_VSywIBLToU4HRDPGR7-CAXRJXXU49G27yPck_wtiMLRvgclzpIXXEMQs4UUIGRVzg/exec"; 
        // ==========================================

        // INI BAGIAN FIREBASE HANYA UNTUK BACA DATA LAMA SAJA
        const K1="AIzaSyBDp0uFHkL0FvZhQ2K",K2="suWVBtVM034rdtME",D="datacsgm.firebaseapp.com",U1="https://datacsgm-default-rtdb.asia-southeast1.",U2="firebasedatabase.app",P="datacsgm",S="datacsgm.firebasestorage.app",M="370220756586",A1="1:370220756586:web:f1188256adb659",A2="aaee2413";
        const firebaseConfig={apiKey:K1+K2,authDomain:D,databaseURL:U1+U2,projectId:P,storageBucket:S,messagingSenderId:M,appId:A1+A2};
        firebase.initializeApp(firebaseConfig);
        const storage = firebase.storage();

        // 📤 UPLOAD FOTO KE FIREBASE STORAGE (TETAP SIMPAN FOTO DI SINI, DATA KE SHEET)
        async function uploadFoto(file) {
            return new Promise((resolve, reject) => {
                const namaFile = `foto_${Date.now()}_${Math.random().toString(36).substr(2, 9)}.jpg`;
                const ref = storage.ref().child('foto_customer/' + namaFile);
                const task = ref.put(file);
                
                task.on('state_changed', 
                    null, 
                    (err) => reject(err), 
                    async () => {
                        const url = await ref.getDownloadURL();
                        resolve(url); // Kembalikan link foto
                    }
                );
            });
        }

        // ✅ FUNGSI UTAMA: KIRIM DATA LANGSUNG KE GOOGLE SHEETS
        document.getElementById("formInput").addEventListener("submit", async function(e) {
            e.preventDefault();

            // Ambil semua nilai dari form
            const nama = document.getElementById("nama").value.trim();
            const nohp = document.getElementById("nohp").value.trim();
            const layanan = document.getElementById("layanan").value;
            const lokasi = document.getElementById("lokasi").value.trim();
            const fileFoto = document.getElementById("fotoInput").files[0];

            if (!fileFoto) {
                Swal.fire({icon: 'warning', title: 'Wajib Ada Foto!', text: 'Silakan pilih foto terlebih dahulu.'});
                return;
            }

            Swal.fire({
                title: 'Sedang Menyimpan...',
                html: 'Mohon tunggu, data sedang dikirim ke Google Sheets<br><b>Data TIDAK masuk ke Firebase Database</b>',
                allowOutsideClick: false,
                didOpen: () => { Swal.showLoading(); }
            });

            try {
                // 1. Upload foto dulu ke Storage Firebase (agar aman)
                const linkFoto = await uploadFoto(fileFoto);

                // 2. Susun data yang akan dikirim
                const dataBaru = {
                    id: Date.now(), // Buat ID unik otomatis
                    nama: nama,
                    nohp: nohp,
                    layanan: layanan,
                    lokasi: lokasi,
                    foto: linkFoto
                };

                // 3. KIRIM LANGSUNG KE GOOGLE SHEETS
                const res = await fetch(GS_DEPLOY_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ data: [dataBaru] })
                });

                const hasil = await res.json();

                if (hasil.status === "sukses") {
                    Swal.fire({
                        icon: 'success',
                        title: 'BERHASIL DISIMPAN! ✅',
                        html: `
                            <p>Data sudah masuk ke Google Sheets.</p>
                            <p class="text-sm text-slate-600 mt-2">Foto tersimpan di Firebase Storage.<br>Database Firebase TIDAK bertambah.</p>
                        `,
                        confirmButtonColor: '#00B14F'
                    });
                    // Reset Form
                    document.getElementById("formInput").reset();
                    document.getElementById("linkFoto").value = "";
                } else {
                    throw new Error(hasil.pesan || 'Respon error dari server');
                }

            } catch (error) {
                Swal.fire({
                    icon: 'error',
                    title: 'Gagal Simpan! ❌',
                    text: 'Kesalahan: ' + error.message,
                    confirmButtonColor: '#ef4444'
                });
            }

        });
    </script>

</body>
</html>
