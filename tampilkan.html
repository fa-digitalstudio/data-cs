<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lihat Data Customer</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['"Plus Jakarta Sans"', 'sans-serif'] },
                    colors: {
                        brand: { grab: '#00B14F', gojek: '#00AA13', maxim: '#FEBE00' }
                    }
                }
            }
        }
    </script>

    <style>
        body { background-color: #f8fafc; }
        .card-hover { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .card-hover:hover { 
            transform: translateY(-5px); 
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.05), 0 8px 10px -6px rgba(0, 0, 0, 0.01);
        }
        .line-clamp-2 { display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        
        /* Animasi loading ojol */
        .animate-ojol { animation: jalan 1.5s cubic-bezier(0.4, 0, 0.6, 1) infinite; }
        @keyframes jalan {
            0% { transform: translateX(-15px) rotate(-5deg); }
            50% { transform: translateX(15px) rotate(5deg); }
            100% { transform: translateX(-15px) rotate(-5deg); }
        }
        
        .blur-text { filter: blur(5px); user-select: none; transition: filter 0.3s; }
        #detailModal { cursor: pointer; }
        #modalContent { cursor: default; }

        /* Ticker Keren */
        .marquee-container {
            overflow: hidden;
            white-space: nowrap;
            background: linear-gradient(135deg, #059669, #0d9488);
            color: white;
            padding: 10px 0;
            border-radius: 12px;
            margin: 16px 0 24px 0;
            box-shadow: 0 4px 15px rgba(13, 148, 136, 0.2);
            position: relative;
        }
        .marquee-container::before, .marquee-container::after {
            content: ''; position: absolute; top: 0; bottom: 0; width: 40px; z-index: 10;
        }
        .marquee-container::before { left: 0; background: linear-gradient(to right, #059669, transparent); border-top-left-radius: 12px; border-bottom-left-radius: 12px; }
        .marquee-container::after { right: 0; background: linear-gradient(to left, #0d9488, transparent); border-top-right-radius: 12px; border-bottom-right-radius: 12px; }
        .marquee-text {
            display: inline-block;
            padding-left: 100%;
            animation: marquee 25s linear infinite;
            font-weight: 600;
            letter-spacing: 0.5px;
        }
        @keyframes marquee {
            0% { transform: translateX(0); }
            100% { transform: translateX(-100%); }
        }

        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #f1f5f9; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
    </style>
</head>
<body class="text-slate-800 font-sans min-h-screen flex flex-col relative overflow-x-hidden">

    <div class="absolute top-0 inset-x-0 h-[400px] bg-gradient-to-b from-teal-50/80 to-transparent -z-10"></div>

    <header class="bg-white/80 backdrop-blur-md text-slate-800 shadow-sm border-b border-slate-200 sticky top-0 z-50 transition-all">
        <div class="container mx-auto px-4 py-4 flex justify-between items-center max-w-7xl">
            <h1 class="text-xl font-extrabold tracking-tight flex items-center gap-2 text-slate-800">
                <div class="bg-gradient-to-br from-emerald-500 to-teal-600 text-white w-9 h-9 flex items-center justify-center rounded-xl shadow-md">
                    <i class="fa-solid fa-address-book"></i>
                </div>
                Data Customer
            </h1>
            <div class="w-10 h-10 rounded-full bg-slate-100 border border-slate-200 flex items-center justify-center shadow-inner overflow-hidden">
                <i class="fa-solid fa-user-shield text-slate-400"></i>
            </div>
        </div>
    </header>

    <main class="container mx-auto px-4 py-6 max-w-7xl flex-grow">
        
        <div class="marquee-container">
            <div class="marquee-text flex items-center gap-2">
                <i class="fa-solid fa-bullhorn text-yellow-300 mr-1"></i> Selamat datang! Halaman ini hanya untuk melihat data ( LOKASI ) Sory yeee hanya Farid Ganteng yang bisa akses nomor handphone costumer ^_^
            </div>
        </div>

        <div class="flex flex-col md:flex-row justify-between items-start md:items-center gap-4 mb-8 bg-white p-4 rounded-2xl shadow-sm border border-slate-100">
            <div class="flex items-center gap-3 flex-wrap w-full md:w-auto">
                <h2 class="text-lg font-bold text-slate-800 border-r-2 border-slate-100 pr-3">Semua Data</h2>
                <span id="totalData" class="bg-emerald-100 text-emerald-800 px-3 py-1 rounded-lg text-sm font-bold shadow-sm">0 Data</span>
                <button onclick="loginWithEmail()" class="ml-auto md:ml-0 bg-white hover:bg-slate-50 text-slate-600 border border-slate-200 px-4 py-1.5 rounded-lg text-sm font-bold transition-all flex items-center gap-2 shadow-sm hover:shadow active:scale-95 group" title="Muat ulang data dari Firebase">
                    <i class="fa-solid fa-rotate group-hover:rotate-180 transition-transform duration-500 text-emerald-500"></i> Muat Ulang
                </button>
            </div>
            
            <div class="relative w-full md:w-80">
                <span class="absolute inset-y-0 left-0 flex items-center pl-4">
                    <i class="fa-solid fa-search text-slate-400"></i>
                </span>
                <input type="text" id="searchInput" class="w-full bg-slate-50 border-none rounded-xl pl-11 pr-4 py-2.5 focus:outline-none focus:ring-2 focus:ring-emerald-500 focus:bg-white transition-all shadow-inner text-sm font-medium placeholder-slate-400" placeholder="Cari nama atau lokasi...">
            </div>
        </div>

        <div id="loadingIndicator" class="hidden flex flex-col items-center justify-center gap-3 my-12">
            <div class="bg-white px-8 py-4 rounded-2xl shadow-md border border-emerald-100 flex items-center gap-4">
                <div class="animate-ojol text-3xl">🛵</div>
                <span class="font-bold text-emerald-600 animate-pulse tracking-wide">Mengambil Data...</span>
            </div>
        </div>

        <div id="dataContainer" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6"></div>

        <div id="loadMoreContainer" class="mt-10 text-center hidden mb-6">
            <button onclick="loadMore()" class="bg-white hover:bg-emerald-50 hover:text-emerald-600 hover:border-emerald-200 text-slate-600 border border-slate-200 font-bold py-2.5 px-8 rounded-xl transition-all shadow-sm hover:shadow-md active:scale-95 group">
                Tampilkan Lebih Banyak <i class="fa-solid fa-chevron-down ml-2 group-hover:translate-y-1 transition-transform"></i>
            </button>
        </div>
    </main>

    <div id="detailModal" class="fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-[60] hidden flex items-center justify-center p-4 opacity-100 transition-opacity" onclick="closeModal()">
        <div id="modalContent" class="bg-white rounded-3xl shadow-2xl w-full max-w-md overflow-hidden transform scale-100 transition-transform" onclick="event.stopPropagation()">
            
            <div class="relative">
                <img id="modalFoto" src="" class="w-full h-72 object-cover" alt="Foto">
                
                <div class="absolute inset-0 bg-gradient-to-t from-slate-900/90 via-slate-900/40 to-transparent"></div>
                
                <button onclick="closeModal()" class="absolute top-4 right-4 bg-black/30 hover:bg-red-500 backdrop-blur-md text-white rounded-full w-9 h-9 flex items-center justify-center transition-colors shadow-lg">
                    <i class="fa-solid fa-xmark text-lg"></i>
                </button>
                
                <div class="absolute bottom-0 left-0 right-0 p-6">
                    <div class="inline-block px-3 py-1 bg-white/20 backdrop-blur-md rounded-lg mb-2 border border-white/30">
                        <p id="modalLayanan" class="text-white text-xs font-bold tracking-wider uppercase"></p>
                    </div>
                    <h3 id="modalNama" class="text-white text-2xl font-extrabold drop-shadow-md"></h3>
                </div>
            </div>
            
            <div class="p-6 space-y-5 bg-slate-50">
                <div class="flex items-center gap-4 bg-white p-4 rounded-2xl shadow-sm border border-slate-100">
                    <div class="w-10 h-10 rounded-full bg-slate-100 flex items-center justify-center text-slate-500 shrink-0">
                        <i class="fa-solid fa-phone"></i>
                    </div>
                    <div class="flex-1">
                        <p class="text-xs font-bold text-slate-400 uppercase tracking-wider mb-0.5">Nomor Handphone</p>
                        <p id="modalNoHP" class="blur-text text-slate-800 font-bold text-lg">**********</p>
                    </div>
                </div>

                <div class="flex gap-4 bg-white p-4 rounded-2xl shadow-sm border border-slate-100">
                    <div class="w-10 h-10 rounded-full bg-slate-100 flex items-center justify-center text-emerald-500 shrink-0 mt-1">
                        <i class="fa-solid fa-map-location-dot"></i>
                    </div>
                    <div class="flex-1">
                        <p class="text-xs font-bold text-slate-400 uppercase tracking-wider mb-0.5">Alamat / Lokasi</p>
                        <p id="modalLokasi" class="text-slate-700 text-sm font-medium leading-relaxed">-</p>
                    </div>
                </div>
                
                <div class="grid grid-cols-2 gap-3 pt-2">
                    <a id="modalMaps" href="#" target="_blank" class="col-span-2 flex justify-center items-center gap-2 bg-gradient-to-r from-blue-600 to-indigo-600 hover:from-blue-700 hover:to-indigo-700 text-white font-bold py-3.5 rounded-xl text-center transition-all shadow-lg shadow-blue-500/30 active:scale-95">
                        <i class="fa-solid fa-location-arrow"></i> Buka di Maps
                    </a>
                    <button id="modalWA" type="button" class="col-span-2 flex justify-center items-center gap-2 bg-slate-200 cursor-not-allowed text-slate-500 font-bold py-3.5 rounded-xl text-center transition-all" onclick="tampilkanPeringatan()">
                        <i class="fa-brands fa-whatsapp text-lg"></i> Chat WhatsApp
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const firebaseConfig = {
          apiKey: "AIzaSyBDp0uFHkL0FvZhQ2KsuWVBtVM034rdtME",
          authDomain: "datacsgm.firebaseapp.com",
          projectId: "datacsgm",
          databaseURL: "https://datacsgm-default-rtdb.asia-southeast1.firebasedatabase.app",
          storageBucket: "datacsgm.firebasestorage.app",
          messagingSenderId: "370220756586",
          appId: "1:370220756586:web:f1188256adb659aaee2413"
        };

        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const database = firebase.database();

        const USER_UID = "8b0ExlzkhySZ36Pbg49rtmPyupl2";
        const USER_EMAIL = "faridaris25@gmail.com";
        const USER_PASSWORD = "admin123";

        let dataCustomer = [];
        let itemsToShow = 6;

        function showLoading() {
            document.getElementById('loadingIndicator').classList.remove('hidden');
        }
        function hideLoading() {
            document.getElementById('loadingIndicator').classList.add('hidden');
        }

        function tampilkanPeringatan() {
            Swal.fire({
                icon: 'warning',
                title: 'Akses Ditolak!',
                text: 'Hanya Mas Farid Ganteng yang punya akses untuk melihat nomor customer! Hahahaha',
                confirmButtonColor: '#059669',
                confirmButtonText: 'Ampun Bang',
                backdrop: `rgba(15, 23, 42, 0.8)`,
                customClass: { popup: 'rounded-3xl', title: 'font-extrabold text-xl' }
            });
        }

        function loginWithEmail() {
            showLoading();
            if (auth.currentUser && auth.currentUser.uid === USER_UID) {
                ambilDataDariFirebase();
                return;
            }
            auth.signInWithEmailAndPassword(USER_EMAIL, USER_PASSWORD)
            .then(() => {
                console.log("Login berhasil");
                ambilDataDariFirebase();
            })
            .catch(error => {
                console.error("Gagal login:", error);
                hideLoading();
                document.getElementById('dataContainer').innerHTML = `
                <div class="col-span-full flex flex-col items-center justify-center py-16 text-slate-500 bg-white rounded-3xl shadow-sm border border-slate-100">
                    <div class="w-20 h-20 bg-red-50 rounded-full flex items-center justify-center mb-4">
                        <i class="fa-solid fa-triangle-exclamation text-4xl text-red-400"></i>
                    </div>
                    <h3 class="text-xl font-bold text-slate-700">Gagal Masuk</h3>
                    <p class="text-sm mt-2">Cek kembali email & sandi akun Firebase</p>
                </div>`;
            });
        }

        function ambilDataDariFirebase() {
            database.ref('customers').once('value')
            .then(snapshot => {
                dataCustomer = [];
                if (snapshot.exists()) {
                    snapshot.forEach(child => {
                        const val = child.val();
                        if (!val.id) val.id = child.key;
                        dataCustomer.push(val);
                    });
                    dataCustomer.sort((a, b) => {
                        const idA = Number(a.id) || a.id;
                        const idB = Number(b.id) || b.id;
                        return idB > idA ? 1 : -1;
                    });
                }
                hideLoading();
                loadData("");
            })
            .catch(error => {
                console.error("Kesalahan baca data:", error);
                hideLoading();
                document.getElementById('dataContainer').innerHTML = `
                <div class="col-span-full flex flex-col items-center justify-center py-16 text-slate-500 bg-white rounded-3xl shadow-sm border border-slate-100">
                    <div class="w-20 h-20 bg-amber-50 rounded-full flex items-center justify-center mb-4">
                        <i class="fa-solid fa-triangle-exclamation text-4xl text-amber-500"></i>
                    </div>
                    <h3 class="text-xl font-bold text-slate-700">Gagal Memuat Data</h3>
                    <p class="text-sm mt-2">Pastikan rules Firebase mengizinkan akses baca</p>
                </div>`;
            });
        }

        function formatWA(nohp) {
            if(!nohp) return "";
            let num = nohp.replace(/\D/g, '');
            if(num.startsWith('0')) num = '62' + num.slice(1);
            else if(num.startsWith('8')) num = '62' + num;
            return num;
        }

        function loadData(search = "") {
            const container = document.getElementById('dataContainer');
            const totalInfo = document.getElementById('totalData');
            const loadMoreBtn = document.getElementById('loadMoreContainer');

            let dataTampil = [...dataCustomer];

            if(search.trim()) {
                const q = search.toLowerCase().trim();
                dataTampil = dataTampil.filter(cust => 
                    (cust.nama && cust.nama.toLowerCase().includes(q)) ||
                    (cust.lokasi && cust.lokasi.toLowerCase().includes(q)) ||
                    (cust.nohp && cust.nohp.includes(q)) ||
                    (cust.layanan && cust.layanan.toLowerCase().includes(q))
                );
            }

            totalInfo.innerText = `${dataTampil.length} Data`;

            if(dataTampil.length === 0) {
                container.innerHTML = `
                <div class="col-span-full flex flex-col items-center justify-center py-16 text-slate-500 bg-white/80 backdrop-blur rounded-3xl shadow-sm border border-slate-100">
                    <div class="w-24 h-24 bg-slate-50 rounded-full flex items-center justify-center mb-5">
                        <i class="fa-solid fa-box-open text-5xl text-slate-300"></i>
                    </div>
                    <h3 class="text-xl font-bold text-slate-700">Tidak ada data</h3>
                    <p class="text-sm mt-2 text-slate-400">Belum ada data tersimpan / tidak ditemukan</p>
                </div>`;
                loadMoreBtn.classList.add('hidden');
                return;
            }

            const tampil = dataTampil.slice(0, itemsToShow);
            let html = "";

            tampil.forEach(cust => {
                // Modifikasi warna disesuaikan dengan identitas brand aslinya agar lebih estetik
                const warna = cust.layanan === 'Grab' ? 'bg-[#00B14F] text-white' : 
                              cust.layanan === 'Maxim' ? 'bg-[#FEBE00] text-black' : 
                              cust.layanan === 'Gojek' ? 'bg-[#00AA13] text-white' :
                              'bg-slate-700 text-white';

                html += `
                <div class="group bg-white rounded-2xl shadow-sm border border-slate-100 p-5 card-hover cursor-pointer relative overflow-hidden" onclick="bukaDetail('${cust.id}')">
                    <div class="absolute top-0 right-0 w-24 h-24 bg-gradient-to-bl from-slate-50 to-transparent rounded-bl-full -z-10 group-hover:scale-110 transition-transform"></div>
                    <div class="flex items-center gap-4">
                        <div class="relative w-16 h-16 shrink-0">
                            <img src="${cust.foto || 'https://via.placeholder.com/150?text=Tanpa+Foto'}" alt="Foto" class="w-full h-full rounded-2xl object-cover shadow-sm group-hover:shadow-md transition-all group-hover:scale-105 duration-300">
                            <div class="absolute inset-0 rounded-2xl ring-1 ring-inset ring-black/5"></div>
                        </div>
                        <div class="flex-1 min-w-0">
                            <h3 class="font-extrabold text-slate-800 text-lg truncate group-hover:text-emerald-600 transition-colors">${cust.nama || '-'}</h3>
                            <div class="mt-1 inline-block ${warna} text-[10px] font-bold px-2.5 py-1 rounded-md uppercase tracking-wider shadow-sm">${cust.layanan || '-'}</div>
                        </div>
                    </div>
                    <div class="mt-4 pt-4 border-t border-slate-50 flex items-start gap-2.5">
                        <i class="fa-solid fa-location-dot text-slate-300 mt-1 group-hover:text-emerald-500 transition-colors"></i>
                        <p class="text-sm text-slate-500 line-clamp-2 leading-relaxed font-medium group-hover:text-slate-700 transition-colors">${cust.lokasi || '-'}</p>
                    </div>
                </div>`;
            });

            container.innerHTML = html;
            loadMoreBtn.classList.toggle('hidden', itemsToShow >= dataTampil.length);
        }

        function loadMore() {
            itemsToShow += 6;
            loadData(document.getElementById('searchInput').value);
        }

        function bukaDetail(id) {
            const cust = dataCustomer.find(c => String(c.id) === String(id));
            if(!cust) return;

            document.getElementById('modalFoto').src = cust.foto || 'https://via.placeholder.com/400x400?text=Tanpa+Foto';
            document.getElementById('modalNama').innerText = cust.nama || '-';
            document.getElementById('modalLayanan').innerText = `${cust.layanan || '-'}`;
            document.getElementById('modalNoHP').innerText = Math.floor(Math.random() * 10) === 5 ? (cust.nohp ? cust.nohp : 'Tidak ada nomor') : '**********';
            document.getElementById('modalLokasi').innerText = cust.lokasi || 'Tidak ada alamat';

            const lokasiAsli = cust.lokasi || '';
            const polaKoordinat = /^-?\d{1,3}\.\d+[,\s]+-?\d{1,3}\.\d+$/;

            let tautanMaps;
            if (polaKoordinat.test(lokasiAsli.trim())) {
                const koordinatBersih = lokasiAsli.trim().replace(/\s+/g, '');
                tautanMaps = `https://www.google.com/maps?q=${koordinatBersih}%0A${encodeURIComponent(lokasiAsli)}`;
            } else {
                tautanMaps = `https://www.google.com/maps?q=${encodeURIComponent(lokasiAsli)}`;
            }

            document.getElementById('modalMaps').href = tautanMaps;
            document.getElementById('detailModal').classList.remove('hidden');
        }

        function closeModal() {
            document.getElementById('detailModal').classList.add('hidden');
        }

        window.addEventListener('load', () => {
            loginWithEmail();
        });

        document.getElementById('searchInput').addEventListener('input', e => {
            clearTimeout(window.cariTunggu);
            window.cariTunggu = setTimeout(() => loadData(e.target.value), 300);
        });
    </script>
</body>
</html>
